- name: Platform \ Render
  commands:
    - command: ./testbed.sh infra-basic ops render
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - k8s/infra-basic/objects.yaml
        - name: ./testbeds/infra-basic/k8s/infra-basic/*.yaml
          data:
            - '-----BEGIN objects.yaml-----'
            - 'apiVersion: v1'
            - 'kind: Secret'
            - 'metadata:'
            - '    name: infra-basic-secret'
            - '    namespace: infra-basic'
            - 'type: Opaque'
            - 'data: {}'
            - '---'
            - 'apiVersion: apps/v1'
            - 'kind: Deployment'
            - 'metadata:'
            - '    name: infra-basic'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    replicas: 1'
            - '    selector:'
            - '        matchLabels:'
            - '            prodigy9.co/app: infra-basic'
            - '            prodigy9.co/part-of: infra-basic'
            - '    revisionHistoryLimit: 2'
            - '    template:'
            - '        metadata:'
            - '            labels:'
            - '                prodigy9.co/app: infra-basic'
            - '                prodigy9.co/part-of: infra-basic'
            - '        spec:'
            - '            containers:'
            - '                - envFrom:'
            - '                    - secretRef:'
            - '                        name: infra-basic-secret'
            - '                  name: infra-basic'
            - '                  image: ghcr.io/prod9/infra-basic:v1.0.0'
            - '                  imagePullPolicy: Always'
            - '                  ports:'
            - '                    - name: port-8080'
            - '                      containerPort: 8080'
            - '                      protocol: TCP'
            - '---'
            - 'apiVersion: v1'
            - 'kind: Service'
            - 'metadata:'
            - '    name: infra-basic-service'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    selector:'
            - '        prodigy9.co/app: infra-basic'
            - '        prodigy9.co/part-of: infra-basic'
            - '    ports:'
            - '        - name: tcp-8080'
            - '          protocol: TCP'
            - '          port: 8080'
            - '          targetPort: 8080'
            - '---'
            - 'apiVersion: gateway.networking.k8s.io/v1'
            - 'kind: ListenerSet'
            - 'metadata:'
            - '    name: infra-basic-listeners'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    parentRef:'
            - '        group: gateway.networking.k8s.io'
            - '        kind: Gateway'
            - '        name: infra-basic-gateway'
            - '    listeners:'
            - '        - name: https-infra-basic-example-com'
            - '          hostname: infra-basic.example.com'
            - '          port: 443'
            - '          protocol: HTTPS'
            - '          tls:'
            - '            mode: Terminate'
            - '            certificateRefs:'
            - '                - name: infra-basic.example.com-tls'
            - '          allowedRoutes:'
            - '            namespaces:'
            - '                from: All'
            - '---'
            - 'apiVersion: gateway.networking.k8s.io/v1'
            - 'kind: HTTPRoute'
            - 'metadata:'
            - '    name: infra-basic-route'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    parentRefs:'
            - '        - group: gateway.networking.k8s.io'
            - '          kind: ListenerSet'
            - '          name: infra-basic-listeners'
            - '    hostnames:'
            - '        - infra-basic.example.com'
            - '    rules:'
            - '        - backendRefs:'
            - '            - name: infra-basic-service'
            - '              port: 8080'
            - '-----END objects.yaml-----'
            - ""
