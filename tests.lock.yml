- name: Platform \ Infra Init
  commands:
    - command: rm -rf testbeds/infra-init/apps testbeds/infra-init/defaults testbeds/infra-init/cue.mod testbeds/infra-init/platform.toml testbeds/infra-init/platform testbeds/infra-init/k8s
      checks:
        - name: exitcode
          data:
            - "0"
        - name: ./testbeds/infra-init/platform.toml
          data: []
        - name: ./testbeds/infra-init/platform
          data: []
    - command: ALWAYS_YES=1 ./testbed.sh infra-init init "Johnny Appleseed" "john@apple.com" "prod9/infra-new" "example.com"
      checks:
        - name: exitcode
          data:
            - "0"
        - name: ./testbeds/infra-init/platform.toml
          data:
            - '-----BEGIN platform.toml-----'
            - maintainer = "Johnny Appleseed <john@apple.com>"
            - repository = "prod9/infra-new"
            - local_arch = "auto"
            - publish_arch = "amd64"
            - strategy = "rolling"
            - excludes = ["*.docker", "*.local", ".dockerignore", ".git", ".github", ".gitignore", ".idea", ".svelte-kit", ".vscode", "build", "dist", "node_modules", "platform.toml", "target"]
            - ""
            - '[modules]'
            - '  [modules.infra-init]'
            - '    workdir = "."'
            - '    timeout = "1m0s"'
            - '    framework = "platform/infra"'
            - '    port = 0'
            - ""
            - '[vars]'
            - '  CERT_MANAGER_VERSION = "v1.20.2"'
            - '  FLUX_HOSTNAME = "flux.prodigy9.co"'
            - '  FLUX_VERSION = "v2.8.8"'
            - '  GATEWAY_API_VERSION = "v1.5.1"'
            - '  NGINX_GATEWAY_VERSION = "v2.6.7"'
            - '  PLATFORM_HOSTNAME = "platform.prodigy9.co"'
            - '-----END platform.toml-----'
            - ""
        - name: ./testbeds/infra-init/platform
          data:
            - '-----BEGIN platform-----'
            - '#!/bin/sh'
            - ""
            - PLATFORM_VERSION="v0.9.9"
            - ""
            - go run "platform.prodigy9.co@$PLATFORM_VERSION" "$@"
            - '-----END platform-----'
            - ""
- name: Platform \ Infra Init Render
  commands:
    - command: ./testbed.sh infra-init render
      checks:
        - name: exitcode
          data:
            - "0"
- name: Platform \ Render
  commands:
    - command: ./testbed.sh infra-basic render
      checks:
        - name: exitcode
          data:
            - "0"
        - name: stdout
          data:
            - k8s/infra-basic/objects.yaml
        - name: ./testbeds/infra-basic/k8s/infra-basic/*.yaml
          data:
            - '-----BEGIN objects.yaml-----'
            - 'apiVersion: v1'
            - 'kind: Secret'
            - 'metadata:'
            - '    name: infra-basic-secret'
            - '    namespace: infra-basic'
            - 'type: Opaque'
            - 'data: {}'
            - '---'
            - 'apiVersion: apps/v1'
            - 'kind: Deployment'
            - 'metadata:'
            - '    name: infra-basic'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    replicas: 1'
            - '    selector:'
            - '        matchLabels:'
            - '            prodigy9.co/app: infra-basic'
            - '            prodigy9.co/part-of: infra-basic'
            - '    revisionHistoryLimit: 2'
            - '    template:'
            - '        metadata:'
            - '            labels:'
            - '                prodigy9.co/app: infra-basic'
            - '                prodigy9.co/part-of: infra-basic'
            - '        spec:'
            - '            containers:'
            - '                - envFrom:'
            - '                    - secretRef:'
            - '                        name: infra-basic-secret'
            - '                  name: infra-basic'
            - '                  image: ghcr.io/prod9/infra-basic:v1.0.0'
            - '                  imagePullPolicy: Always'
            - '                  ports:'
            - '                    - name: port-8080'
            - '                      containerPort: 8080'
            - '                      protocol: TCP'
            - '---'
            - 'apiVersion: v1'
            - 'kind: Service'
            - 'metadata:'
            - '    name: infra-basic-service'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    selector:'
            - '        prodigy9.co/app: infra-basic'
            - '        prodigy9.co/part-of: infra-basic'
            - '    ports:'
            - '        - name: tcp-8080'
            - '          protocol: TCP'
            - '          port: 8080'
            - '          targetPort: 8080'
            - '---'
            - 'apiVersion: gateway.networking.k8s.io/v1'
            - 'kind: ListenerSet'
            - 'metadata:'
            - '    name: infra-basic-listeners'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    parentRef:'
            - '        group: gateway.networking.k8s.io'
            - '        kind: Gateway'
            - '        name: infra-basic-gateway'
            - '    listeners:'
            - '        - name: https-infra-basic-example-com'
            - '          hostname: infra-basic.example.com'
            - '          port: 443'
            - '          protocol: HTTPS'
            - '          tls:'
            - '            mode: Terminate'
            - '            certificateRefs:'
            - '                - name: infra-basic.example.com-tls'
            - '          allowedRoutes:'
            - '            namespaces:'
            - '                from: All'
            - '---'
            - 'apiVersion: gateway.networking.k8s.io/v1'
            - 'kind: HTTPRoute'
            - 'metadata:'
            - '    name: infra-basic-route'
            - '    namespace: infra-basic'
            - 'spec:'
            - '    parentRefs:'
            - '        - group: gateway.networking.k8s.io'
            - '          kind: ListenerSet'
            - '          name: infra-basic-listeners'
            - '    hostnames:'
            - '        - infra-basic.example.com'
            - '    rules:'
            - '        - backendRefs:'
            - '            - name: infra-basic-service'
            - '              port: 8080'
            - '-----END objects.yaml-----'
            - ""
- name: Platform \ Infra Build
  commands:
    - command: ./testbed.sh infra-basic -q build
      checks:
        - name: exitcode
          data:
            - "0"
